<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>氷室うつろのタイピングゲーム</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            /* 🔗 既存の background-color を以下のように書き換えます */
            background-image: url("bg_image.png"); /* ★ここに背景にしたい画像ファイル名を入れる★ */
            background-size: cover;                /* 画面全体に画像をぴったり引き伸ばす */
            background-position: center;           /* 画像の中心を画面の真ん中に合わせる */
            background-attachment: fixed;         /* 画面がスクロールしても背景を固定する */
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        #game-container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-align: center;
            width: 750px;
        }
        h1 {
            color: #5c6bc0;
            margin-bottom: 20px;
        }
        .pc-only-banner {
            background-color: #ffebee;
            color: #c62828;
            border: 2px solid #ef9a9a;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 20px;
        }
        .game-layout {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
        }
        .image-area {
            width: 200px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #fafafa;
            border-radius: 10px;
            border: 2px dashed #e0e0e0;
            overflow: hidden;
        }
        #utsuro-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            image-rendering: pixelated;
        }
        .text-area {
            flex: 1;
            text-align: left;
        }
        #kanji-display {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #1a237e;
            min-height: 40px;
        }
        #kana-display {
            font-size: 16px;
            color: #757575;
            letter-spacing: 1px;
            margin-bottom: 15px;
            min-height: 22px;
        }
        #typing-display {
            font-size: 24px;
            font-family: monospace;
            letter-spacing: 2px;
            background-color: #eceff1;
            padding: 15px;
            border-radius: 8px;
            min-height: 35px;
            margin-bottom: 20px;
            text-align: center;
        }
        .typed { color: #b0bec5; }
        .untyped { color: #d32f2f; font-weight: bold; }
        #score-display {
            font-size: 18px;
            font-weight: bold;
        }
        
        button {
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 25px;
            cursor: pointer;
            transition: opacity 0.2s, background-color 0.2s;
            font-weight: bold;
        }
        button:hover {
            opacity: 0.9;
        }
        button:disabled {
            background-color: #cccccc !important;
            cursor: not-allowed;
        }
        
        .difficulty-container {
            margin: 20px 0;
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .btn-easy { background-color: #4caf50; }
        .btn-normal { background-color: #2196f3; }
        .btn-hard { background-color: #ff5722; }
        .btn-share {
            background-color: #000000;
            margin-top: 15px;
            padding: 10px 25px;
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .highscore-display {
            font-size: 15px;
            color: #ffb300;
            font-weight: bold;
            margin-top: 5px;
        }
        
        #difficulty-badge {
            font-size: 14px;
            font-weight: bold;
            color: white;
            padding: 3px 10px;
            border-radius: 10px;
            display: inline-block;
            margin-bottom: 10px;
        }
        #error-message {
            color: #d32f2f;
            font-weight: bold;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <h1>氷室うつろ タイピングゲーム</h1>
    
    <div id="start-screen">
        <div class="pc-only-banner">
            ⚠️ 物理キーボード必須（PC専用ゲームです。スマホ・タブレット非対応）
        </div>

        <!-- エラー発生時のみ警告を表示するエリア -->
        <div id="error-message"></div>

        <p>挑戦する難易度を選択してください！</p>
        
        <div class="difficulty-container">
            <div>
                <button id="btn-easy" class="btn-easy" onclick="startGame('easy')" disabled>かんたん (90秒)</button>
                <div id="highscore-easy" class="highscore-display">👑 最高: 0 点</div>
            </div>
            <div>
                <button id="btn-normal" class="btn-normal" onclick="startGame('normal')" disabled>ふつう (60秒)</button>
                <div id="highscore-normal" class="highscore-display">👑 最高: 0 点</div>
            </div>
            <div>
                <button id="btn-hard" class="btn-hard" onclick="startGame('hard')" disabled>むずかしい (30秒)</button>
                <div id="highscore-hard" class="highscore-display">👑 最高: 0 点</div>
            </div>
        </div>
        
        <p style="color: #d32f2f; font-size: 14px; font-weight: bold; margin-bottom: 15px;">⚠️ 注：ボタンを押すと音楽が流れます</p>
        
        <div id="result-area" style="display: none;">
            <p id="final-score-text" style="font-size: 20px; font-weight: bold; margin-top: 20px; color: #1a237e;"></p>
            <p id="new-record-text" style="font-size: 18px; font-weight: bold; color: #e53935; display: none; margin-top: 5px;">🎉 この難易度での最高記録更新！！</p>
            <button class="btn-share" onclick="shareOnX()">𝕏 結果をポストする</button>
        </div>
    </div>

    <div id="game-screen" style="display: none;">
        <div id="difficulty-badge"></div>
        
        <div class="game-layout">
            <div class="image-area">
                <img id="utsuro-img" src="utsuro_normal.png" alt="氷室うつろ">
            </div>
            
            <div class="text-area">
                <div id="kanji-display"></div>
                <div id="kana-display"></div>
            </div>
        </div>
        
        <div id="typing-display"></div>
        <div id="score-display">残り時間: <span id="timer">60</span>秒 | スコア: <span id="score">0</span></div>
    </div>
</div>

<audio id="bgm" src="bgm.mp3" loop></audio>

<script>
// 🌟 主からいただいたGoogleスプレッドシートの公開CSV用アドレスを直接設定しました！
const SPREADSHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS8LcvFteNKwd7-XOLg3aJKG1QOQGxeAvqx3ZeTrs4RMfF7PYzSQwRnhQDnSS_psFW700l36MHWreuB/pub?gid=0&single=true&output=csv";

let wordList = []; 

const romanMap = {
    'あ':['a'], 'い':['i','yi'], 'う':['u','wu'], 'え':['e','ye'], 'お':['o'],
    'か':['ka'], 'き':['ki'], 'く':['ku'], 'け':['ke'], 'こ':['ko'],
    'さ':['sa'], 'し':['si','shi'], 'す':['su'], 'せ':['se'], 'そ':['so'],
    'た':['ta'], 'ち':['ti','chi'], 'つ':['tu','tsu'], 'て':['te'], 'と':['to'],
    'な':['na'], 'に':['ni'], 'ぬ':['nu'], 'ね':['ne'], 'の':['no'],
    'は':['ha'], 'ひ':['hi'], 'ふ':['fu','hu'], 'へ':['he'], 'ほ':['ho'],
    'ま':['ma'], 'み':['mi'], 'む':['mu'], 'め':['me'], 'とも':['mo'],
    'や':['ya'], 'ゆ':['yu'], 'よ':['yo'],
    'ら':['ra'], 'り':['ri'], 'る':['ru'], 'れ':['re'], 'ろ':['ro'],
    'わ':['wa'], 'を':['wo'], 'ん':['n'],
    'が':['ga'], 'ぎ':['gi'], 'ぐ':['gu'], 'げ':['ge'], 'ご':['go'],
    'ざ':['za'], 'じ':['zi','ji'], 'ず':['zu'], 'ぜ':['ze'], 'ぞ':['zo'],
    'だ':['da'], 'ぢ':['di','zi','ji'], 'づ':['du','zu'], 'で':['de'], 'ど':['do'],
    'ば':['ba'], 'び':['bi'], 'ぶ':['bu'], 'べ':['be'], 'ぼ':['bo'],
    'ぱ':['pa'], 'ぴ':['pi'], 'ぷ':['pu'], 'ぺ':['pe'], 'ぽ':['po'],
    'きゃ':['kya'], 'きゅ':['kyu'], 'きょ':['kyo'],
    'しゃ':['sya','sha'], 'しゅ':['syu','shu'], 'しょ':['syo','sho'],
    'ちゃ':['tya','cha'], 'ちゅ':['tyu','chu'], 'ちょ':['tyo','cho'],
    'にゃ':['nya'], 'にゅ':['nyu'], 'にょ':['nyo'],
    'ひゃ':['hya'], 'ひゅ':['hyu'], 'ひょ':['hyo'],
    'みゃ':['mya'], 'みゅ':['myu'], 'みょ':['myo'],
    'りゃ':['rya'], 'りゅ':['ryu'], 'りょ':['ryo'],
    'ぎゃ':['gya'], 'ぎゅ':['gyu'], 'ぎょ':['gyo'],
    'じゃ':['zya','ja'], 'じゅ':['zyu','ju'], 'じょ':['zyo','jo'],
    'びゃ':['bya'], 'びゅ':['byu'], 'びょ':['byo'],
    'ぴゃ':['pya'], 'ぴゅ':['pyu'], 'ぴょ':['pyo'],
    'うぉ':['who','uxo'], 
    'ぁ':['la','xa'], 'ぃ':['li','xi'], 'ぅ':['lu','xu','xtu','ltu'], 'ぇ':['le','xe'], 'ぉ':['lo','xo'],
    'ゃ':['lya','xya'], 'ゅ':['lyu','xyu'], 'ょ':['lyo','xyo'], 'ゎ':['lwa','xwa'],
    'っ':['ltu','xtu','c','s','t'],
    'ー':['-'], '！':['!'], '、':[','], ' ':[' ']
};

let currentWord = {};
let remainingKana = "";
let currentRomaOptions = []; 
let displayRoma = "";        
let typedRoma = "";         
let score = 0;
let timeLeft = 60;
let timerInterval;
let isPlaying = false;
let isAnimating = false;
let questionPool = [];

let currentDifficulty = 'normal';
let highScores = { easy: 0, normal: 0, hard: 0 };

const bgm = document.getElementById("bgm");

async function loadWordListFromSpreadsheet() {
    try {
        const response = await fetch(SPREADSHEET_CSV_URL);
        if (!response.ok) throw new Error("データの取得に失敗しました");
        
        const data = await response.text();
        const rows = data.split(/\r?\n/);
        
        const loadedWords = [];
        for (let i = 1; i < rows.length; i++) {
            if (!rows[i].trim()) continue;
            
            const cols = rows[i].split(",");
            if (cols.length >= 2) {
                const kanjiVal = cols[0].replace(/^"|"$/g, '').trim();
                const kanaVal = cols[1].replace(/^"|"$/g, '').trim();
                
                if (kanjiVal && kanaVal) {
                    loadedWords.push({ kanji: kanjiVal, kana: kanaVal });
                }
            }
        }
        
        if (loadedWords.length === 0) {
            document.getElementById("error-message").innerText = "⚠️ スプレッドシートにお題データが見つかりません";
            return;
        }
        
        wordList = loadedWords;
        document.getElementById("error-message").innerText = ""; 
        
        document.getElementById("btn-easy").disabled = false;
        document.getElementById("btn-normal").disabled = false;
        document.getElementById("btn-hard").disabled = false;
        
    } catch (error) {
        console.error(error);
        document.getElementById("error-message").innerText = "⚠️ お題データの読み込みに失敗しました。URLの設定を確認してください。";
    }
}

function loadAllHighScores() {
    highScores.easy = parseInt(localStorage.getItem("utsuro_typing_hs_easy") || 0, 10);
    highScores.normal = parseInt(localStorage.getItem("utsuro_typing_hs_normal") || 0, 10);
    highScores.hard = parseInt(localStorage.getItem("utsuro_typing_hs_hard") || 0, 10);
    
    document.getElementById("highscore-easy").innerText = `👑 最高: ${highScores.easy} 点`;
    document.getElementById("highscore-normal").innerText = `👑 最高: ${highScores.normal} 点`;
    document.getElementById("highscore-hard").innerText = `👑 最高: ${highScores.hard} 点`;
}

loadAllHighScores();
loadWordListFromSpreadsheet();

function shufflePool() {
    questionPool = [...wordList];
    for (let i = questionPool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [questionPool[i], questionPool[j]] = [questionPool[j], questionPool[i]];
    }
}

function startGame(diff) {
    currentDifficulty = diff;
    const badge = document.getElementById("difficulty-badge");
    if (diff === 'easy') {
        timeLeft = 90;
        badge.innerText = "かんたんモード (90秒)";
        badge.style.backgroundColor = "#4caf50";
    } else if (diff === 'hard') {
        timeLeft = 30;
        badge.innerText = "むずかしいモード (30秒)";
        badge.style.backgroundColor = "#ff5722";
    } else {
        timeLeft = 60;
        badge.innerText = "ふつうモード (60秒)";
        badge.style.backgroundColor = "#2196f3";
    }

    document.getElementById("start-screen").style.display = "none";
    document.getElementById("result-area").style.display = "none";
    document.getElementById("new-record-text").style.display = "none";
    document.getElementById("game-screen").style.display = "block";
    
    score = 0;
    isPlaying = true;
    isAnimating = false;
    document.getElementById("score").innerText = score;
    document.getElementById("timer").innerText = timeLeft;
    document.getElementById("utsuro-img").src = "utsuro_normal.png";
    
    bgm.volume = 0.2;
    bgm.currentTime = 0; 
    bgm.play().catch(err => {
        console.log("BGMの再生に失敗しました");
    });

    shufflePool();
    nextWord();
    
    timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById("timer").innerText = timeLeft;
        if (timeLeft <= 0) endGame();
    }, 1000);
}

function applyHepburnMacron(kana) {
    let noBar = kana.replace(/ー/g, "");
    let result = "";
    let i = 0;
    while (i < noBar.length) {
        let char = noBar[i];
        let next = noBar[i + 1];
        
        if (char === "ん") {
            if (!next || !["あ","い","う","え","お","や","ゆ","よ","ぁ","ぃ","ぅ","ぇ","ぉ","ゃ","ゅ","ょ"].includes(next)) {
                result += char; 
                i++;
                continue; 
            }
        }
        
        if ((char === "お" || char === "こ" || char === "そ" || char === "と" || char === "の" || char === "ほ" || char === "も" || char === "よ" || char === "ろ" || char === "ご" || char === "ぞ" || char === "ど" || char === "ぼ" || char === "ぽ" || char === "きょ" || char === "しょ" || char === "ちょ" || char === "にょ" || char === "ひょ" || char === "みょ" || char === "りょ" || char === "ぎょ" || char === "じょ" || char === "びゃ" || char === "ぴゃ") && (next === "う" || next === "お")) {
            result += char;
            i += 2;
        } else if (i + 2 <= noBar.length && ["きょ", "しゃ", "しゅ", "しょ", "ちゃ", "ちゅ", "ちょ", "にゃ", "にゅ", "にょ", "ひゃ", "ひゅ", "ひょ", "みゃ", "みゅ", "みょ", "りゃ", "りゅ", "りょ", "ぎゃ", "ぎゅ", "ぎょ", "じゃ", "じゅ", "じょ", "びゃ", "びゅ", "びょ", "ぴゃ", "ぴゅ", "ぴょ"].includes(noBar.substring(i, i+2))) {
            let doubleChar = noBar.substring(i, i+2);
            let nextNext = noBar[i + 2];
            if (nextNext === "う" || nextNext === "お") {
                result += doubleChar;
                i += 3;
            } else {
                result += doubleChar;
                i += 2;
            }
        } else {
            result += char;
            i++;
        }
    }
    return result;
}

function nextWord() {
    if (questionPool.length === 0) {
        shufflePool();
    }
    currentWord = questionPool.pop();
    
    remainingKana = applyHepburnMacron(currentWord.kana);
    typedRoma = "";
    
    document.getElementById("kanji-display").innerText = currentWord.kanji;
    document.getElementById("kana-display").innerText = currentWord.kana; 
    
    parseNextRoma();
    displayRoma = makeDefaultRoma(remainingKana);
    updateDisplay();
}

function parseNextRoma() {
    if (remainingKana.length === 0) {
        currentRomaOptions = [];
        return;
    }
    if (remainingKana.startsWith("っ") && remainingKana.length > 1) {
        const nextChar = remainingKana.charAt(1);
        const nextRomaList = romanMap[nextChar] || [nextChar.toLowerCase()];
        currentRomaOptions = [...romanMap['っ'], ...nextRomaList.map(r => r.charAt(0))];
        return;
    }
    if (remainingKana.length >= 2) {
        const doubleChar = remainingKana.substring(0, 2);
        if (romanMap[doubleChar]) {
            currentRomaOptions = romanMap[doubleChar];
            return;
        }
    }
    const singleChar = remainingKana.substring(0, 1);
    currentRomaOptions = romanMap[singleChar] || [singleChar.toLowerCase()];
}

function makeDefaultRoma(kana) {
    let res = "";
    let i = 0;
    while (i < kana.length) {
        if (kana[i] === "っ" && i + 1 < kana.length) {
            let next = romanMap[kana[i+1]];
            res += next ? next[0].charAt(0) : "x";
            i++;
            continue;
        }
        if (i + 1 < kana.length && romanMap[kana.substring(i, i+2)]) {
            res += romanMap[kana.substring(i, i+2)][0];
            i += 2;
        } else {
            res += (romanMap[kana[i]] ? romanMap[kana[i]][0] : kana[i].toLowerCase());
            i++;
        }
    }
    return res;
}

function updateDisplay() {
    let html = `<span class="typed">${typedRoma}</span><span class="untyped">${displayRoma.substring(typedRoma.length)}</span>`;
    document.getElementById("typing-display").innerHTML = html;
}

window.addEventListener("keydown", (e) => {
    if (!isPlaying || isAnimating) return;
    if (e.key.length !== 1) return;
    
    const pressed = e.key.toLowerCase();
    let matchedOption = currentRomaOptions.find(opt => opt.startsWith(pressed));
    
    if (matchedOption) {
        typedRoma += pressed;
        
        if (remainingKana.startsWith("っ") && remainingKana.length > 1 && !romanMap['っ'].includes(pressed + currentRomaOptions.find(opt => opt.startsWith(pressed)).substring(1))) {
            remainingKana = remainingKana.substring(1);
            displayRoma = typedRoma + makeDefaultRoma(remainingKana);
            parseNextRoma();
            updateDisplay();
            return;
        }

        currentRomaOptions = currentRomaOptions
            .filter(opt => opt.startsWith(pressed))
            .map(opt => opt.substring(1))
            .filter(opt => opt.length > 0);
            
        if (currentRomaOptions.length === 0) {
            if (remainingKana.length >= 2 && romanMap[remainingKana.substring(0, 2)]) {
                remainingKana = remainingKana.substring(2);
            } else {
                remainingKana = remainingKana.substring(1);
            }
            displayRoma = typedRoma + makeDefaultRoma(remainingKana);
            parseNextRoma();
        } else {
            let nextPredict = matchedOption.substring(1);
            displayRoma = typedRoma + nextPredict + makeDefaultRoma(remainingKana.substring(remainingKana.length >= 2 && romanMap[remainingKana.substring(0, 2)] ? 2 : 1));
        }
        
        updateDisplay();
        
        if (remainingKana.length === 0 && currentRomaOptions.length === 0) {
            score += 10;
            document.getElementById("score").innerText = score;
            
            isAnimating = true;
            document.getElementById("utsuro-img").src = "utsuro_clear.png";
            
            setTimeout(() => {
                document.getElementById("utsuro-img").src = "utsuro_normal.png";
                isAnimating = false;
                nextWord();
            }, 400);
        }
    }
});

function endGame() {
    clearInterval(timerInterval);
    isPlaying = false;
    
    bgm.pause();
    
    document.getElementById("start-screen").style.display = "block";
    document.getElementById("game-screen").style.display = "none";
    document.getElementById("result-area").style.display = "block";
    
    let diffName = "ふつう";
    if (currentDifficulty === 'easy') diffName = "かんたん";
    if (currentDifficulty === 'hard') diffName = "むずかしい";
    
    document.getElementById("final-score-text").innerText = `今回のスコア（${diffName}）: ${score} 点`;
    
    const storageKey = "utsuro_typing_hs_" + currentDifficulty;
    const pastHighScore = highScores[currentDifficulty];
    
    if (score > pastHighScore) {
        localStorage.setItem(storageKey, score);
        document.getElementById("new-record-text").style.display = "block";
    } else {
        document.getElementById("new-record-text").style.display = "none";
    }
    
    loadAllHighScores();
    
    alert(`タイムアップ！あなたのスコアは ${score} でした！`);
}

function shareOnX() {
    let diffName = "ふつう";
    if (currentDifficulty === 'easy') diffName = "かんたん";
    if (currentDifficulty === 'hard') diffName = "むずかしい";
    
    const gameUrl = window.location.href;
    
    const text = `氷室うつろタイピングゲーム（${diffName}モード）で、スコア【 ${score} 点 】を達成しました！\nみんなも推しの語録をタイピングしよう！\n`;
    const hashtags = "氷室うつろ,タイピングゲーム";
    
    const shareUrl = `https://x.com/intent/post?text=${encodeURIComponent(text)}&url=${encodeURIComponent(gameUrl)}&hashtags=${encodeURIComponent(hashtags)}`;
    
    window.open(shareUrl, '_blank', 'width=600,height=400');
}
</script>

</body>
</html>
